                                    </div>
                                    <div className="bg-slate-300/50 p-12 rounded-b-[3rem] overflow-auto flex justify-center min-h-[1000px] border border-slate-200 backdrop-blur-md shadow-inner print:p-0 print:border-none print:shadow-none print:bg-transparent print:block print:min-h-0 print:overflow-visible">
                                        <div className="origin-top scale-95 shadow-2xl bg-white print:scale-100 print:shadow-none print:m-0 print:bg-transparent print:flex print:justify-center">
                                            {previewDocType === 'plan' && <DocumentPlanView details={activityDetails} selectedCount={selectedMemberIds.length} orgName={orgName} appLogo={appLogo} currentSeal={currentManagerSeal} />}
                                            {previewDocType === 'roster' && <DocumentRosterView details={activityDetails} selectedMembers={selList} orgName={orgName} appLogo={appLogo} currentSeal={currentManagerSeal} useAutoSignature={useAutoSignature} />}
                                            {previewDocType === 'cert' && <DocumentCertView details={activityDetails} selectedCount={selectedMemberIds.length} selectedMembers={selList} orgName={orgName} orgAddr={orgAddr} appLogo={appLogo} currentSeal={currentManagerSeal} />}
                                            {previewDocType === 'report' && <DocumentReportView details={activityDetails} reportDetails={reportDetails} membersCount={members.length} selectedMembers={selList} orgName={orgName} appLogo={appLogo} currentSeal={currentManagerSeal} activityTypes={activityTypes} />}
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="bg-white rounded-[4rem] shadow-2xl p-16 no-print border border-slate-200 animate-fadeIn max-w-7xl mx-auto">
                                <div className="flex justify-between items-center mb-14">
                                    <h2 className="text-4xl flex items-center gap-6 text-slate-900 tracking-tighter fw-black"><Icon name="Archive" size={48} className="text-blue-600"/> Archives</h2>
                                    <div className="flex gap-3 items-center">
                                        <button onClick={() => {
                                            if (selectedHistoryIds.length === historyDocs.length) setSelectedHistoryIds([]);
                                            else setSelectedHistoryIds(historyDocs.map(d => d.id));
                                        }} className={cx(UI.buttonOutline, "rounded-xl flex items-center gap-2 px-4 py-2")}>
                                            <Icon name="CheckSquare" size={16}/>
                                            {selectedHistoryIds.length === historyDocs.length && historyDocs.length > 0 ? "선택 해제" : "전체 선택"}
                                        </button>
                                        <button 
                                            onClick={handleDeleteSelectedHistory} 
                                            className={cx(UI.buttonDanger, "rounded-xl flex items-center gap-2 px-4 py-2", selectedHistoryIds.length === 0 ? "opacity-50 cursor-not-allowed" : "")}
                                            disabled={selectedHistoryIds.length === 0}
                                        >
                                            <Icon name="Trash2" size={16}/> 선택 삭제 {selectedHistoryIds.length > 0 && `(${selectedHistoryIds.length})`}
                                        </button>
                                        <div className="w-px h-6 bg-slate-300 mx-2"></div>
                                        <button onClick={handleExportHistory} className="bg-slate-800 text-white px-4 py-2 rounded-xl text-sm flex items-center gap-2 hover:bg-slate-700 transition-colors"><Icon name="DownloadCloud" size={16}/> 백업 파일로 저장</button>
                                        <label className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm flex items-center gap-2 cursor-pointer hover:bg-indigo-700 transition-colors">
                                            <Icon name="UploadCloud" size={16}/> 백업 불러오기
                                            <input type="file" className="hidden" accept=".json" onChange={handleImportHistory} />
                                        </label>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                                    {historyDocs.map(doc => {
                                        // 가상의 파일명 생성
                                        const fileTitle = doc.title ? doc.title.replace(/\s+/g, '_') : '무제';
                                        const fileName = `${doc.details?.date ? doc.details.date.replace(/-/g, '') : '날짜없음'}_${fileTitle}.vms`;

                                        return (
                                        <div 
                                            key={doc.id} 
                                            onDoubleClick={() => restoreHistory(doc)}
                                            className={cx("group border p-12 rounded-[4rem] hover:shadow-2xl transition-all cursor-pointer bg-white relative", selectedHistoryIds.includes(doc.id) ? "border-indigo-500 shadow-lg ring-2 ring-indigo-500/20" : "border-slate-200")}
                                        >
                                            <div className="absolute top-8 left-8 z-20">
                                                <input 
                                                    type="checkbox" 
                                                    className="w-6 h-6 accent-indigo-600 cursor-pointer rounded-lg"
                                                    checked={selectedHistoryIds.includes(doc.id)}
                                                    onChange={(e) => {
                                                        e.stopPropagation();
                                                        if (e.target.checked) setSelectedHistoryIds([...selectedHistoryIds, doc.id]);
                                                        else setSelectedHistoryIds(selectedHistoryIds.filter(id => id !== doc.id));
                                                    }}
                                                    onClick={(e) => e.stopPropagation()}
                                                />
                                            </div>
                                            <button onClick={(e)=>{ e.stopPropagation(); if(confirm("이 기록을 삭제하시겠습니까?")) setHistoryDocs(historyDocs.filter(x=>x.id!==doc.id)); }} className="absolute top-6 right-6 p-3 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition-all opacity-0 group-hover:opacity-100 z-10"><Icon name="Trash2" size={24}/></button>
                                            
                                            <div className="mb-8 mt-2">
                                                <span className="inline-flex items-center gap-1.5 bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-xs font-bold border border-indigo-100 mb-3">
                                                    <Icon name="FileText" size={14}/> {fileName}
                                                </span>
                                                <h4 className="fw-black text-2xl leading-tight line-clamp-2">{doc.title}</h4>
                                            </div>
                                            
                                            <button onClick={(e)=>{ e.stopPropagation(); restoreHistory(doc); }} className="text-blue-600 flex items-center gap-3 hover:translate-x-3 transition-transform uppercase font-bold">Restore <Icon name="ArrowRight" size={20}/></button>
                                        </div>
                                    )})}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 회원 정보 수정 모달 */}
                    {isEditModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[2500] flex items-center justify-center p-4 backdrop-blur-sm no-print">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col animate-in fade-in zoom-in duration-200">
                                <div className="p-6 bg-slate-900 text-white flex justify-between items-center">
                                    <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="UserCheck" /> 회원 정보 수정</h2>
                                    <button onClick={() => setIsEditModalOpen(false)} className="hover:text-red-400 transition-colors"><Icon name="X" size={24}/></button>
                                </div>
                                <div className="p-8 space-y-5 max-h-[70vh] overflow-y-auto custom-scroll bg-slate-50/50">
                                    <div className="grid grid-cols-2 gap-5">
                                        <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500">No.</label><input className={UI.input} value={editFormData.excelNo || ''} onChange={e=>setEditFormData({...editFormData, excelNo:e.target.value})} /></div>
                                        <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500">성명</label><input className={UI.input} value={editFormData.name || ''} onChange={e=>setEditFormData({...editFormData, name:e.target.value})} /></div>
                                        <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500">구분</label>
                                            <select className={cx(UI.input, "bg-white")} value={editFormData.category || ''} onChange={e=>setEditFormData({...editFormData, category:e.target.value})}>
                                                <option value="봉사자">봉사자</option><option value="관리자">관리자</option>
                                            </select>
                                        </div>
                                        <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500">역할</label><input className={UI.input} value={editFormData.role || ''} onChange={e=>setEditFormData({...editFormData, role:e.target.value})} /></div>
                                        <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500">연락처</label><input className={UI.input} value={editFormData.phone || ''} onChange={e=>setEditFormData({...editFormData, phone:e.target.value})} /></div>
                                        <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500">이메일</label><input className={UI.input} value={editFormData.email || ''} onChange={e=>setEditFormData({...editFormData, email:e.target.value})} /></div>
                                        <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500">생년월일</label><input className={UI.input} value={editFormData.dob || ''} onChange={e=>setEditFormData({...editFormData, dob:e.target.value})} /></div>
                                        <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500">가입일</label><input className={UI.input} value={editFormData.joinDate || ''} onChange={e=>setEditFormData({...editFormData, joinDate:e.target.value})} /></div>
                                    </div>
                                    <div className="space-y-1.5 relative">
                                        <label className="text-[11px] font-bold text-slate-500">주소지</label>
                                        <input className={cx(UI.input, "pr-24 bg-white")} value={editFormData.address || ''} onChange={e=>setEditFormData({...editFormData, address:e.target.value})} />
                                        <button type="button" onClick={() => { setAddressTarget({ mode: 'edit' }); setIsAddressModalOpen(true); }} className="absolute right-1 top-[24px] bg-slate-100 text-blue-600 px-3 py-1.5 rounded-lg text-xs flex items-center gap-1 border border-slate-200 hover:bg-slate-200 font-bold shadow-sm transition-colors">
                                            <Icon name="Search" size={14}/> 주소검색
                                        </button>
                                    </div>
                                </div>
                                <div className="p-5 bg-white border-t flex justify-end gap-3">
                                    <button onClick={() => setIsEditModalOpen(false)} className={cx(UI.buttonOutline, "px-6 py-2.5")}>취소</button>
                                    <button onClick={() => {
                                        setMembers(prev => prev.map(old => old.id === editFormData.id ? { 
                                            ...old, 
                                            ...editFormData,
                                            phone: formatPhone(editFormData.phone),
                                            dob: formatDate(editFormData.dob),
                                            joinDate: formatDate(editFormData.joinDate)
                                        } : old)); 
                                        setIsEditModalOpen(false);
                                    }} className={cx(UI.buttonSuccess, "px-8 py-2.5 shadow-md")}>저장하기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <AddressSearchModal isOpen={isAddressModalOpen} onClose={() => setIsAddressModalOpen(false)} onComplete={handleAddressComplete} />
                    
                    {/* 설정 모달 */}
                    {isSettingsOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[2000] flex items-center justify-center p-6 backdrop-blur-2xl no-print">
                            <div className="bg-white rounded-[4rem] shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden border border-slate-200">
                                <div className="p-12 bg-slate-900 text-white flex justify-between items-center"><h2 className="text-2xl font-bold flex items-center gap-4"><Icon name="Settings" size={32} /> Configuration</h2><button onClick={()=>setIsSettingsOpen(false)} className="hover:rotate-90 hover:text-red-400 transition-all duration-500"><Icon name="X" size={32}/></button></div>
                                <div className="p-10 overflow-y-auto flex-1 space-y-10">
                                    <section className="space-y-4">
                                        <h3 className={UI.sectionTitle}><Icon name="Image" size={24}/> 시스템 로고</h3>
                                        <div className="flex items-center gap-4">
                                            <div className="w-20 h-20 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center bg-slate-50 overflow-hidden shadow-inner shrink-0">
                                                {appLogo ? <img src={appLogo} className="max-w-full max-h-full object-contain" onError={(e) => e.target.style.display='none'} /> : <span className="text-slate-300 text-xs text-center font-bold">NO LOGO</span>}
                                            </div>
                                            <div className="flex flex-col gap-2 flex-1">
                                                <input type="text" className={UI.input} value={appLogo || ''} onChange={e=>setAppLogo(e.target.value)} placeholder="이미지 파일명 (예: logo.png) 또는 URL 입력" />
                                                <label className={cx(UI.buttonPrimary, "w-fit")}>PC에서 파일 찾기<input type="file" className="hidden" accept="image/*" onChange={async (e) => {if(e.target.files[0]) setAppLogo(await resizeImage(e.target.files[0]))}} /></label>
                                            </div>
                                        </div>
                                    </section>
                                    <section className="space-y-4"><h3 className={UI.sectionTitle}><Icon name="Building" size={24}/> 기관 정보</h3><div className="space-y-2"><input type="text" className={cx(UI.input, "bg-slate-50 p-4 rounded-2xl")} value={orgName} onChange={e=>setOrgName(e.target.value)} placeholder="기관 명칭" /><input type="text" className={cx(UI.input, "bg-slate-50 p-4 rounded-2xl")} value={orgAddr} onChange={e=>setOrgAddr(e.target.value)} placeholder="기관 주소" /></div></section>
                                    
                                    <section className="space-y-4">
                                        <h3 className={UI.sectionTitle}><Icon name="ListChecks" size={24}/> 활동 구분 관리</h3>
                                        <div className="space-y-2">
                                            {activityTypes.map((type, idx) => (
                                                <div key={type.id} className="flex gap-2 items-center">
                                                    <input type="text" className={UI.input} value={type.label} onChange={e => {
                                                        const newTypes = [...activityTypes];
                                                        newTypes[idx].label = e.target.value;
                                                        setActivityTypes(newTypes);
                                                    }} />
                                                    <button onClick={() => setActivityTypes(activityTypes.filter(t => t.id !== type.id))} className="text-red-500 p-2 hover:bg-red-50 rounded-lg transition-colors"><Icon name="MinusCircle" size={20}/></button>
                                                </div>
                                            ))}
                                            <button onClick={() => setActivityTypes([...activityTypes, { id: Date.now().toString(), label: '신규 구분' }])} className="w-full bg-slate-100 text-slate-600 p-3 rounded-lg text-sm font-bold border border-dashed border-slate-300 flex items-center justify-center gap-2 mt-2 hover:bg-slate-200 transition-colors"><Icon name="PlusCircle" size={16}/> 항목 추가</button>
                                        </div>
                                    </section>

                                    {renderPresetManager('활동 명칭 사전등록', 'FileText', presetTitles, setPresetTitles)}
                                    {renderPresetManager('활동 준비사항 사전등록', 'PackageCheck', presetPreparations, setPresetPreparations)}
                                    {renderPresetManager('기타사항 사전등록', 'MessageSquare', presetOtherDetails, setPresetOtherDetails)}

                                    <section className="space-y-4">
                                        <h3 className={UI.sectionTitle}><Icon name="PenTool" size={24}/> 관리자 직인 관리</h3>
                                        {members.filter(m => m.category === '관리자').map(mgr => (
                                            <div key={mgr.id} className="flex items-center justify-between p-4 bg-slate-50 border rounded-2xl">
                                                <span className="text-slate-800 font-bold w-1/3">{mgr.name}</span>
                                                <div className="flex items-center gap-3 w-2/3 justify-end">
                                                    <input type="text" className={cx(UI.input, "text-xs w-full")} value={savedSeals[mgr.name] || ''} onChange={e => setSavedSeals(prev => ({...prev, [mgr.name]: e.target.value}))} placeholder="파일명 (예: seal.png)" />
                                                    <div className="w-10 h-10 border bg-white rounded-lg overflow-hidden flex items-center justify-center shadow-inner shrink-0">
                                                        {savedSeals[mgr.name] ? <img src={savedSeals[mgr.name]} className="max-w-full max-h-full object-contain" onError={(e) => e.target.style.display='none'} /> : <Icon name="Stamp" className="text-slate-200"/>}
                                                    </div>
                                                    <label className={cx(UI.buttonPrimary, "bg-indigo-600 hover:bg-indigo-700 whitespace-nowrap px-3 py-2")}>찾기<input type="file" className="hidden" onChange={async (e) => { if(e.target.files[0]) { const b64 = await resizeImage(e.target.files[0], 200); setSavedSeals(prev => ({...prev, [mgr.name]: b64})); } }} /></label>
                                                </div>
                                            </div>
                                        ))}
                                    </section>
                                </div>
                                <div className="p-8 border-t bg-white text-right"><button onClick={()=>setIsSettingsOpen(false)} className="bg-blue-600 text-white px-20 py-5 rounded-[2rem] fw-black text-xl shadow-2xl hover:bg-blue-700 active:scale-95 transition-transform">CLOSE</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
