<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자원봉사 활동 통합 관리 시스템</title>
    <!-- 필수 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Gamja+Flower&family=Hi+Melody&family=Gaegu&family=Poor+Story&family=Nanum+Brush+Script&family=East+Sea+Dokdo&family=Dongle:wght@400;700&display=swap" rel="stylesheet">

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            color: #1e293b;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            font-weight: 500;
        }

        /* 폰트 굵기 유틸 (Tailwind와 혼용 방지를 위해 최소화) */
        .fw-black { font-weight: 900; }

        .paper-view {
            width: 210mm;
            min-height: 297mm;
            background: white;
            margin: 0 auto;
            padding: 12mm 15mm;
            box-sizing: border-box;
            color: black;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* 가로 양식용 뷰 */
        .paper-view-landscape {
            width: 297mm;
            min-height: 210mm;
        }

        @media print {
            body { background: white !important; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .paper-view, .paper-view-landscape {
                width: 100% !important;
                max-width: 100% !important;
                min-height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
                border: none !important;
                page-break-after: auto;
                box-sizing: border-box !important;
            }
            table { page-break-inside: auto; width: 100% !important; max-width: 100% !important; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            thead { display: table-header-group; }
            .no-break { page-break-inside: avoid; } /* 추가됨: 서명란 잘림 방지 */
        }

        .master-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        .master-table th {
            position: sticky; top: 0; z-index: 10;
            background-color: #f8fafc; border-bottom: 2px solid #e2e8f0;
            padding: 0.75rem 0.5rem; font-weight: 800; color: #334155;
            text-transform: uppercase; font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .master-table th:hover { background-color: #f1f5f9; }
        .master-table td {
            padding: 0.5rem 0.5rem; border-bottom: 1px solid #f1f5f9;
            vertical-align: middle; font-size: 0.85rem;
        }
        .master-table tr:hover { background-color: #f1f7ff; }

        .status-badge {
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
        }

        /* 텍스트로 인한 테이블 너비 확장(잘림) 방지를 위해 break-all 명시 적용 */
        table.preview-table { 
            table-layout: fixed; width: 100%; border-collapse: collapse; border: 1.2px solid black; 
            word-break: break-all; 
        }
        table.preview-table th, table.preview-table td { 
            border: 1px solid black; padding: 6px; text-align: center; font-size: 12.5px; color: black; 
            word-break: break-all; 
        }
        .bg-h { background-color: #f2f2f2 !important; font-weight: 800; }
        .bg-s { background-color: #fafafa !important; }

        .glass-panel { background: white; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .focused-item { background-color: #3b82f6 !important; color: white !important; }
        input[type="number"]::-webkit-inner-spin-button, input[type="time"]::-webkit-inner-spin-button { opacity: 1; cursor: pointer; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Fragment } = React;

        // =====================================================================
        // Core Utilities (데이터 정규화 및 방어적 프로그래밍)
        // =====================================================================
        
        // 1. 클래스 중복 제거기 (font-bold 누적 방지)
        const cx = (...classes) => {
            const tokens = classes
                .flatMap(cls => typeof cls === 'string' ? cls.split(/\s+/) : [])
                .map(s => s.trim())
                .filter(Boolean);
            return [...new Set(tokens)].join(' ');
        };

        // 2. 안전한 JSON 파서 (앱 크래시 방지)
        const safeParse = (key, fallback) => {
            try {
                const value = localStorage.getItem(key);
                return value ? JSON.parse(value) : fallback;
            } catch (e) {
                console.warn(`${key} 파싱 실패`, e);
                return fallback;
            }
        };

        // 3. UI 상수화 (Gemini 수정 시 일관성 유지)
        const UI = {
            input: 'w-full border p-2 rounded text-sm shadow-inner font-bold focus:outline-none focus:ring-1 focus:ring-blue-500',
            buttonPrimary: 'bg-blue-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 active:scale-95 transition-transform cursor-pointer',
            buttonSuccess: 'bg-emerald-600 text-white px-6 py-2 rounded-xl text-sm font-bold flex items-center gap-2 shadow-lg hover:bg-emerald-500 active:scale-95 transition-transform cursor-pointer',
            buttonDanger: 'bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-600 active:scale-95 transition-transform cursor-pointer',
            buttonOutline: 'bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-50 active:scale-95 transition-transform cursor-pointer',
            panel: 'glass-panel font-bold flex flex-col',
            sectionTitle: 'text-lg border-b pb-2 flex items-center gap-2 font-bold text-blue-900',
        };

        // --- Configs ---
        const SIGNATURE_FONTS = [
            "'Nanum Pen Script', cursive", 
            "'Gamja Flower', cursive", 
            "'Hi Melody', cursive", 
            "'Gaegu', cursive", 
            "'Poor Story', cursive", 
            "'Nanum Brush Script', cursive",
            "'East Sea Dokdo', cursive",
            "'Dongle', sans-serif"
        ];
        const TARGET_OPTIONS = ['아동·청소년', '장애인', '노인', '쪽방촌', '다문화가정', '여성', '환경', '고향봉사', '기타'];
        const FIELD_OPTIONS = ['생활편의지원', '주거환경', '교육/상담', '농어촌봉사', '문화행사', '환경보호', '안전·방범', '인권·공익', '기타'];

        // --- Formatting Functions ---
        const formatPhone = (str) => { if (!str) return ''; const num = str.toString().replace(/[^0-9]/g, ''); if (num.length <= 3) return num; if (num.length <= 7) return `${num.slice(0, 3)}-${num.slice(3)}`; return `${num.slice(0, 3)}-${num.slice(3, 7)}-${num.slice(7, 11)}`; };
        const formatDate = (val) => { if (!val) return ''; const num = String(val).replace(/[^0-9]/g, ''); if (num.length <= 4) return num; if (num.length <= 6) return `${num.slice(0, 4)}-${num.slice(4)}`; return `${num.slice(0, 4)}-${num.slice(4, 6)}-${num.slice(6, 8)}`; };
        
        // 한국어 날짜 포맷 (Footer용)
        const formatKoreanDate = (dateStr) => {
            if (!dateStr) return '____년 __월 __일';
            const [y, m, d] = dateStr.split('-');
            if (!y || !m || !d) return '____년 __월 __일';
            return `${y}년 ${Number(m)}월 ${Number(d)}일`;
        };

        // 엑셀 날짜 일련번호 처리
        const parseExcelDate = (value) => {
            if (typeof value === 'number' && window.XLSX?.SSF?.parse_date_code) {
                const d = window.XLSX.SSF.parse_date_code(value);
                if (d) return `${d.y}-${String(d.m).padStart(2, '0')}-${String(d.d).padStart(2, '0')}`;
            }
            return formatDate(String(value || ''));
        };
        
        const resizeImage = (file, maxWidth = 400) => new Promise((res) => { 
            const reader = new FileReader(); 
            reader.readAsDataURL(file); 
            reader.onload = (e) => { 
                const img = new Image(); 
                img.src = e.target.result; 
                img.onload = () => { 
                    const cvs = document.createElement('canvas'); 
                    const ctx = cvs.getContext('2d'); 
                    let w = img.width, h = img.height; 
                    if (w > maxWidth) { h *= maxWidth / w; w = maxWidth; } 
                    cvs.width = w; cvs.height = h; 
                    ctx.drawImage(img, 0, 0, w, h); 
                    res(cvs.toDataURL('image/png', 0.8)); 
                }; 
            }; 
        });

        // 실사 느낌의 서명(글맵시)을 생성하는 함수
        const getSignatureStyle = (name, index) => {
            if (!name) return {};
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            hash = Math.abs(hash + index * 31);

            const fontIndex = hash % SIGNATURE_FONTS.length;
            const fontName = SIGNATURE_FONTS[fontIndex];
            const rotation = (hash % 16) - 8;
            const scale = 1.0 + ((hash % 30) / 100);
            const skew = (hash % 24) - 12;
            const letterSpacing = -1 - (hash % 3);
            const colors = ['#0f0f0f', '#000033', '#111111', '#1a1a2e', '#000022', '#222'];
            const color = colors[hash % colors.length];
            const opacity = 0.85 + ((hash % 15) / 100); 

            let baseSize = '1.6rem';
            if (fontName.includes('Dongle')) baseSize = '2.2rem';
            if (fontName.includes('Dokdo')) baseSize = '2.0rem';
            if (fontName.includes('Brush')) baseSize = '1.8rem';

            return {
                fontFamily: fontName,
                fontSize: baseSize,
                transform: `rotate(${rotation}deg) scale(${scale}) skewX(${skew}deg)`,
                color: color,
                opacity: opacity,
                letterSpacing: `${letterSpacing}px`,
                display: 'inline-block',
                fontWeight: (hash % 3 === 0) ? 'bold' : 'normal',
                whiteSpace: 'nowrap',
                transformOrigin: 'center',
                padding: '2px 6px'
            };
        };

        // =====================================================================
        // Components
        // =====================================================================

        const Icon = ({ name, size = 18, className = "" }) => {
            const [iconData, setIconData] = useState(null);
            useEffect(() => {
                if (window.lucide?.icons) {
                    const camelName = name.charAt(0).toLowerCase() + name.slice(1);
                    const data = window.lucide.icons[camelName] || window.lucide.icons[name];
                    if (data) setIconData(data);
                }
            }, [name]);
            if (!iconData || !Array.isArray(iconData) || !Array.isArray(iconData[2])) return <span style={{ width: size, height: size, display: 'inline-block' }} className={className}></span>;
            return (
                <svg {...iconData[1]} width={size} height={size} className={cx('lucide', className)} xmlns="http://www.w3.org/2000/svg" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round">
                    {iconData[2].map((child, i) => (child && child[0]) ? React.createElement(child[0], { ...child[1], key: i }) : null)}
                </svg>
            );
        };

        // --- 커스텀 시간 선택기 컴포넌트 ---
        const CustomTimePicker = ({ value, onChange }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [hour, setHour] = useState(value ? value.split(':')[0] : '13');
            const [minute, setMinute] = useState(value ? value.split(':')[1] : '00');
            const modalRef = useRef(null);

            useEffect(() => {
                if (value) {
                    setHour(value.split(':')[0] || '13');
                    setMinute(value.split(':')[1] || '00');
                }
            }, [value]);

            useEffect(() => {
                const handleClickOutside = (e) => {
                    if (modalRef.current && !modalRef.current.contains(e.target)) {
                        setIsOpen(false);
                    }
                };
                if (isOpen) {
                    document.addEventListener('mousedown', handleClickOutside);
                }
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, [isOpen]);

            const handleConfirm = () => {
                onChange(`${hour}:${minute}`);
                setIsOpen(false);
            };

            return (
                <div className="relative flex-1" ref={modalRef}>
                    <div 
                        className={cx(UI.input, "cursor-pointer flex justify-between items-center bg-white text-slate-700 select-none")}
                        onClick={() => setIsOpen(!isOpen)}
                    >
                        <span>{value || '00:00'}</span>
                        <Icon name="Clock" size={16} className="text-slate-400" />
                    </div>
                    {isOpen && (
                        <div className="absolute top-full left-0 mt-2 bg-white border border-slate-200 shadow-2xl rounded-2xl p-4 z-[2000] w-56 flex flex-col gap-3">
                            <div className="text-center text-sm font-bold text-indigo-700 mb-1 border-b pb-2">시간 선택</div>
                            <div className="flex gap-2 items-center justify-center font-bold">
                                <select className={cx(UI.input, "px-2 py-2 text-center text-base bg-slate-50 cursor-pointer")} value={hour} onChange={e=>setHour(e.target.value)}>
                                    {[...Array(24)].map((_, i) => {
                                        const v = String(i).padStart(2, '0');
                                        return <option key={v} value={v}>{v}시</option>;
                                    })}
                                </select>
                                <span>:</span>
                                <select className={cx(UI.input, "px-2 py-2 text-center text-base bg-slate-50 cursor-pointer")} value={minute} onChange={e=>setMinute(e.target.value)}>
                                    {[...Array(60)].map((_, i) => {
                                        const v = String(i).padStart(2, '0');
                                        return <option key={v} value={v}>{v}분</option>;
                                    })}
                                </select>
                            </div>
                            <button onClick={handleConfirm} className={cx(UI.buttonPrimary, "w-full py-2 mt-2")}>확인</button>
                        </div>
                    )}
                </div>
            );
        };

        // 개선된 주소 검색 모달 (2단계 상세 주소 입력 포함)
        const AddressSearchModal = ({ isOpen, onClose, onComplete }) => {
            const containerRef = useRef(null);
            const detailInputRef = useRef(null);
            
            const [step, setStep] = useState(1); // 1: 기본주소 검색, 2: 상세주소 입력
            const [baseAddress, setBaseAddress] = useState('');
            const [detailAddress, setDetailAddress] = useState('');

            // 열릴 때마다 상태 초기화
            useEffect(() => {
                if (isOpen) {
                    setStep(1);
                    setBaseAddress('');
                    setDetailAddress('');
                }
            }, [isOpen]);

            // 상세 주소 입력 단계로 넘어가면 입력창 자동 포커스
            useEffect(() => {
                if (step === 2 && detailInputRef.current) {
                    detailInputRef.current.focus();
                }
            }, [step]);

            useEffect(() => {
                if (!isOpen || step !== 1 || !containerRef.current) return;
                
                // 자식 요소가 비어있을 때만 Daum API를 초기화
                if (containerRef.current.childElementCount === 0) {
                    if (!window.daum || !window.daum.Postcode) {
                        containerRef.current.innerHTML = '<div style="padding:20px;color:red;font-weight:bold;text-align:center;">API 로딩 실패</div>';
                        return;
                    }

                    new window.daum.Postcode({
                        oncomplete: function(data) {
                            // 기본 주소 추출
                            let addr = data.roadAddress || data.jibunAddress || data.address || '';
                            
                            // 건물명(아파트 등)이 있으면 괄호로 추가
                            let extra = '';
                            if (data.bname && data.apartment === 'Y') {
                                extra += data.bname;
                            }
                            if (extra) {
                                addr += ` (${extra})`;
                            }

                            // Daum API 스크립트 실행이 안전하게 종료될 수 있도록 딜레이 후 React 상태 변경
                            setTimeout(() => {
                                setBaseAddress(addr);
                                setStep(2); // 상세 주소 입력 단계로 전환
                            }, 50);
                        },
                        width: '100%', 
                        height: '100%'
                        // embed 모드에서는 충돌을 유발할 수 있으므로 autoClose: false 옵션은 제외
                    }).embed(containerRef.current); 
                }
            }, [isOpen, step]); 

            // 최종 완료 처리
            const handleFinalComplete = () => {
                const fullAddress = detailAddress.trim() ? `${baseAddress} ${detailAddress.trim()}` : baseAddress;
                onComplete({ address: fullAddress });
            };

            // 닫혀있을 때는 깔끔하게 null을 반환하여 React 언마운트
            if (!isOpen) return null; 

            return (
                <div 
                    className="fixed inset-0 bg-black/60 z-[3000] flex items-center justify-center p-4 no-print backdrop-blur-sm"
                    onMouseDown={(e) => {
                        if (e.target === e.currentTarget) onClose();
                    }}
                >
                    <div 
                        className="bg-white rounded-xl shadow-2xl w-full max-w-lg flex flex-col overflow-hidden border border-slate-300 transition-all duration-300"
                        style={{ height: step === 1 ? '600px' : 'auto' }}
                        onMouseDown={(e) => e.stopPropagation()} 
                    >
                        <div className="p-4 bg-slate-900 text-white flex justify-between items-center font-bold shrink-0">
                            <h2 className="flex items-center gap-2"><Icon name="MapPin" /> {step === 1 ? '주소 검색' : '상세 주소 입력'}</h2>
                            <button onClick={onClose} className="hover:text-red-400 transition-colors">
                                <Icon name="X" size={24}/>
                            </button>
                        </div>
                        
                        {step === 1 && (
                            <div className="bg-indigo-50 text-indigo-700 text-xs text-center py-2 font-bold border-b border-indigo-100 shrink-0">
                                <Icon name="Info" size={14} className="inline mr-1 -mt-0.5" /> 주소를 클릭하면 상세 주소 입력 화면으로 넘어갑니다.
                            </div>
                        )}
                        
                        <div ref={containerRef} className={cx("flex-1 bg-white w-full h-full", step === 1 ? "block" : "hidden")}></div>

                        {step === 2 && (
                            <div className="p-8 flex flex-col gap-6 animate-in fade-in zoom-in duration-300">
                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-slate-600">기본 주소</label>
                                    <div className="w-full border border-slate-200 bg-slate-50 p-3 rounded-xl text-slate-800 font-bold text-sm">
                                        {baseAddress}
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-blue-600">상세 주소 입력</label>
                                    <input 
                                        type="text" 
                                        ref={detailInputRef}
                                        className="w-full border-2 border-blue-300 p-3 rounded-xl text-slate-900 font-bold focus:outline-none focus:ring-4 focus:ring-blue-100 text-sm transition-all" 
                                        placeholder="동, 호수 등 상세 주소를 입력해주세요" 
                                        value={detailAddress} 
                                        onChange={(e) => setDetailAddress(e.target.value)} 
                                        onKeyDown={(e) => { if (e.key === 'Enter') handleFinalComplete(); }}
                                    />
                                </div>
                                <div className="flex gap-2 mt-4">
                                    <button onClick={() => setStep(1)} className="w-1/3 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3.5 rounded-xl transition-colors text-sm">
                                        다시 검색
                                    </button>
                                    <button onClick={handleFinalComplete} className="w-2/3 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-colors text-sm">
                                        입력 완료
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const SharedFooter = ({ activityDate, orgName, appLogo, manager, currentSeal }) => (
            <div className="mt-auto pt-6 text-center no-break font-bold">
                <p className="mb-2 text-sm text-gray-700">위와 같이 자원봉사 활동을 확인합니다.</p>
                <p className="text-lg tracking-[2px] mb-4">{formatKoreanDate(activityDate)}</p>
                <div className="flex justify-center items-center gap-6">
                    <div className="flex items-center gap-2">
                        {appLogo && <img src={appLogo} alt="Logo" className="h-8 object-contain mix-blend-multiply" />}
                        <span className="text-xl font-bold">기관명 : <span className="underline underline-offset-8">{orgName}</span></span>
                    </div>
                    <div className="flex items-center gap-2 ml-4">
                        <span className="text-xl font-bold">확인자 : {manager}</span>
                        <div className="relative w-14 h-14 ml-3 flex items-center justify-center border-2 border-slate-100 rounded-2xl text-[10px] italic text-slate-300 font-normal">
                            (날인)
                            {currentSeal && <img src={currentSeal} className="absolute inset-0 w-full h-full object-contain mix-blend-multiply opacity-95 p-1" />}
                        </div>
                    </div>
                </div>

                            {presetTitles.map(p => <option key={p.id} value={p.label}>{p.label}</option>)}
                        </select>
                        <input type="text" className={UI.input} placeholder="활동 명칭 (직접 입력 및 수정 가능)" value={details.title} onChange={e=>setDetails({...details, title: e.target.value})} />
                    </div>

                    <div className="grid grid-cols-2 gap-2">
                        <input type="date" className={UI.input} value={details.date} onChange={e=>setDetails({...details, date: e.target.value})} />
                        <select className={cx(UI.input, "bg-white")} value={details.managerId} onChange={e=>{
                            const m = members.find(x => x.id === e.target.value);
                            if(m) setDetails({...details, managerId: m.id, manager: m.name, managerPhone: m.phone});
                        }}><option value="">확인자 선택</option>{members.filter(m => m.category === '관리자').map(m => <option key={m.id} value={m.id}>{m.name}</option>)}</select>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                        <input type="text" className={UI.input} placeholder="장소" value={details.location} onChange={e=>setDetails({...details, location: e.target.value})} />
                        <div className="flex items-center gap-1 border rounded px-2 bg-white shadow-inner focus-within:ring-1 focus-within:ring-blue-500">
                            <input type="number" className="w-full p-2 outline-none font-bold bg-transparent" value={details.totalTimeNum} onChange={e=>setDetails({...details, totalTimeNum: e.target.value})} />
                            <span className="text-gray-400 shrink-0 font-bold">시간</span>
                        </div>
                    </div>
                    <div className="flex gap-2">
                        <CustomTimePicker value={details.startTime} onChange={val=>setDetails({...details, startTime: val})} />
                        <CustomTimePicker value={details.endTime} onChange={val=>setDetails({...details, endTime: val})} />
                    </div>
                    <div className="pt-2 border-t">
                        <p className="text-[11px] text-blue-600 mb-1 font-bold">활동대상/분야 선택</p>
                        <div className="flex flex-wrap gap-1 mb-2">
                            {TARGET_OPTIONS.map(opt => <button key={opt} onClick={() => setDetails(p => ({...p, targetAudience: p.targetAudience.includes(opt) ? p.targetAudience.filter(x=>x!==opt) : [...p.targetAudience, opt]}))} className={cx("px-2 py-1 rounded text-[10px] border transition-colors", details.targetAudience.includes(opt) ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-500')}>{opt}</button>)}
                        </div>
                        <div className="flex flex-wrap gap-1 mb-4">
                            {FIELD_OPTIONS.map(opt => <button key={opt} onClick={() => setDetails(p => ({...p, activityField: p.activityField.includes(opt) ? p.activityField.filter(x=>x!==opt) : [...p.activityField, opt]}))} className={cx("px-2 py-1 rounded text-[10px] border transition-colors", details.activityField.includes(opt) ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-white text-gray-500')}>{opt}</button>)}
                        </div>
                        
                        <div className="space-y-3 pt-2">
                            {/* 활동준비사항 - 드롭다운 연동 */}
                            <div>
                                <label className="text-[11px] text-blue-800 font-bold block mb-1">활동준비사항</label>
                                <div className="flex flex-col gap-1">
                                    <select 
                                        className={cx(UI.input, "bg-slate-50 text-blue-700 py-1.5 cursor-pointer")} 
                                        onChange={e => { 
                                            if(e.target.value) setDetails({...details, preparation: e.target.value}); 
                                            e.target.value=''; 
                                        }}
                                    >
                                        <option value="">== 준비사항 불러오기 ==</option>
                                        {presetPreparations.map(p => <option key={p.id} value={p.label}>{p.label}</option>)}
                                    </select>
                                    <input type="text" className={UI.input} value={details.preparation} onChange={e=>setDetails({...details, preparation: e.target.value})} placeholder="준비물 등 직접 입력 가능" />
                                </div>
                            </div>

                            {/* 기타사항 - 드롭다운 연동 */}
                            <div>
                                <label className="text-[11px] text-blue-800 font-bold block mb-1">기타사항</label>
                                <div className="flex flex-col gap-1">
                                    <select 
                                        className={cx(UI.input, "bg-slate-50 text-blue-700 py-1.5 cursor-pointer")} 
                                        onChange={e => { 
                                            if(e.target.value) setDetails({...details, otherDetails: e.target.value}); 
                                            e.target.value=''; 
                                        }}
                                    >
                                        <option value="">== 기타사항 불러오기 ==</option>
                                        {presetOtherDetails.map(p => <option key={p.id} value={p.label}>{p.label}</option>)}
                                    </select>
                                    <textarea className={cx(UI.input, "h-16 resize-none")} value={details.otherDetails} onChange={e=>setDetails({...details, otherDetails: e.target.value})} placeholder="추가 전달사항 직접 입력 가능" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        // =====================================================================
        // Main Application
        // =====================================================================
        function App() {
            // 회원 No 자동 계산기
            const calculateNextNo = (list) => {
                if (!list || list.length === 0) return 1;
                const maxNo = Math.max(...list.map(m => parseInt(m.excelNo) || 0));
                return maxNo + 1;
            };

            const [activeTab, setActiveTab] = useState('members');
            const [members, setMembers] = useState([]);
            const [historyDocs, setHistoryDocs] = useState([]);
            const [isAddressModalOpen, setIsAddressModalOpen] = useState(false);
            const [addressTarget, setAddressTarget] = useState(null);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [previewDocType, setPreviewDocType] = useState('plan');
            const [docSearchTerm, setDocSearchTerm] = useState('');
            const [focusedIndex, setFocusedIndex] = useState(-1);
            const [sortConfig, setSortConfig] = useState({ key: 'excelNo', direction: 'asc' });
            const [dbSearchTerm, setDbSearchTerm] = useState('');
            const [useAutoSignature, setUseAutoSignature] = useState(true); // 자동 서명 상태 추가
            const [isUploading, setIsUploading] = useState(false); // 엑셀 로딩 상태 추가
            const [currentPage, setCurrentPage] = useState(1); // 테이블 페이지네이션 상태
            const rowsPerPage = 50; // 페이지당 표시할 회원 수 최적화

            // Branding & Settings (safeParse 적용)
            const [appLogo, setAppLogo] = useState(() => localStorage.getItem('vms_logo_f53'));
            const [orgName, setOrgName] = useState(() => localStorage.getItem('vms_on_f53') || "따숨");
            const [orgAddr, setOrgAddr] = useState(() => localStorage.getItem('vms_oa_f53') || "경남 창원시 진해구 해원로 45 우림필유 101동 504호");
            const [savedSeals, setSavedSeals] = useState(() => safeParse('vms_ss_f53', {}));
            const [activityTypes, setActivityTypes] = useState(() => safeParse('vms_at_f53', [
                { id: '1', label: '① 회의' },
                { id: '2', label: '② 교육' },
                { id: '3', label: '③ 봉사활동' },
                { id: '4', label: '④ 친선행사' }
            ]));

            // 사전 등록 항목 (활동명칭, 준비사항, 기타사항) - 요청하신 내용으로 기본값 적용
            const defaultTitles = [{id: '1', label: '‘뜨신편지’ 손편지 답장 교육 및 쓰기'}];
            const defaultPreps = [{id: '1', label: '고민 편지의 손편지 답장 봉사'}];
            const defaultOthers = [{id: '1', label: '각자의 경험에 맞는 사연의 편지를 선택하고, 손편지 답장 봉사'}];

            // 새로운 기본값이 즉시 반영되도록 로컬스토리지 키를 _v2로 업데이트
            const [presetTitles, setPresetTitles] = useState(() => safeParse('vms_pt_v2', defaultTitles));
            const [presetPreparations, setPresetPreparations] = useState(() => safeParse('vms_pp_v2', defaultPreps));
            const [presetOtherDetails, setPresetOtherDetails] = useState(() => safeParse('vms_po_v2', defaultOthers));

            // 신규 회원 항목 확장
            const [newMember, setNewMember] = useState({ name: '', category: '봉사자', role: '', phone: '', email: '', dob: '', address: '', excelNo: '', joinDate: '' });
            
            // 모달 편집을 위한 상태 추가
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [editFormData, setEditFormData] = useState({});
            
            const [activityDetails, setActivityDetails] = useState({ title: '', date: new Date().toISOString().split('T')[0], startTime: '13:00', endTime: '17:00', totalTimeNum: '4', location: '', managerId: '', manager: '윤금서', managerPhone: '', targetAudience: [], activityField: [], preparation: '', otherDetails: '' });
            const [reportDetails, setReportDetails] = useState({ joinCount: '0', joinNames: '', leaveCount: '0', leaveNames: '', incomeBranch: '0', incomeInterest: '0', carryover: '0', expense: '0', activityType: '3', rows: [] });
            const [selectedMemberIds, setSelectedMemberIds] = useState([]);
            
            // 보고서의 표에 추가할 개별 데이터 입력을 위한 상태
            const [reportRowInput, setReportRowInput] = useState({ date: '', title: '', location: '', startTime: '', endTime: '', recognizedTime: '', attendees: '', attendeeMode: 'auto' });
            // 현재 수정 중인 보고서 표의 행 인덱스 (null이면 새 내역 추가)
            const [editingReportRowIndex, setEditingReportRowIndex] = useState(null);

            // 보관소 항목 선택 관리 및 편집 모드 상태
            const [selectedHistoryIds, setSelectedHistoryIds] = useState([]);
            const [editingHistoryId, setEditingHistoryId] = useState(null); // 현재 수정 중인 보관소 기록 ID

            useEffect(() => {
                const loadedMembers = safeParse('vms_db_f53', []);
                setMembers(loadedMembers);
                setHistoryDocs(safeParse('vms_hist_f53', []));

                setNewMember(prev => ({ ...prev, excelNo: calculateNextNo(loadedMembers).toString() }));

                const defaultManager = loadedMembers.find(m => m.name === '윤금서' && m.category === '관리자');
                if (defaultManager) {
                    setActivityDetails(prev => ({ ...prev, managerId: defaultManager.id, manager: defaultManager.name, managerPhone: defaultManager.phone }));
                }

                // GitHub 등 웹 서버 환경에서 회원명부.xlsx 자동 불러오기
                fetch('./회원명부.xlsx')
                    .then(res => {
                        if (!res.ok) throw new Error('파일 없음');
                        return res.arrayBuffer();
                    })
                    .then(buffer => {
                        const wb = window.XLSX.read(new Uint8Array(buffer), { type: 'array' });
                        const json = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                        let currentMax = loadedMembers.length > 0 ? Math.max(...loadedMembers.map(m => parseInt(m.excelNo) || 0)) : 0;

                        const parsed = json.map((row, i) => {
                            const phoneRaw = String(row['전화번호'] || row['연락처'] || row['휴대폰'] || '');
                            let eNo = String(row['No.'] || row['no'] || row['번호'] || row['No'] || '').trim();
                            if (!eNo) {
                                currentMax++;
                                eNo = currentMax.toString();
                            } else {
                                const pNo = parseInt(eNo);
                                if (!isNaN(pNo) && pNo > currentMax) currentMax = pNo;
                            }

                            return {
                                id: typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : (Date.now() + i + Math.random()).toString(36),
                                excelNo: eNo,
                                name: String(row['성명'] || row['이름'] || '').trim(),
                                category: String(row['구분'] || '봉사자').trim(),
                                role: String(row['역할'] || row['직책'] || row['직위'] || '').trim(),
                                phone: formatPhone(phoneRaw),
                                email: String(row['이메일'] || row['e-mail'] || row['email'] || '').trim(),
                                dob: parseExcelDate(row['생년월일']),
                                address: String(row['주소'] || '').trim(),
                                joinDate: parseExcelDate(row['가입일'] || row['등록일']),
                            }
                        }).filter(m => m.name);

                        // 이름과 연락처를 기준으로 중복을 제외하고 새로운 데이터만 병합 (기존 서명, 수정 데이터 보존)
                        setMembers(prevMembers => {
                            const newMembers = parsed.filter(pm => 
                                !prevMembers.some(em => em.name === pm.name && em.phone === pm.phone)
                            );
                            if (newMembers.length > 0) {
                                console.log(`자동 불러오기: ${newMembers.length}명의 새 회원이 추가되었습니다.`);
                                return [...newMembers, ...prevMembers];
                            }
                            return prevMembers;
                        });
                    })
                    .catch(err => {
                        console.log('자동 불러오기 생략 (회원명부.xlsx 파일이 없거나 접근할 수 없습니다.)');
                    });
            }, []);

            useEffect(() => {
                setNewMember(prev => ({ ...prev, excelNo: calculateNextNo(members).toString() }));
            }, [members]);

            useEffect(() => {
                try {
                    localStorage.setItem('vms_db_f53', JSON.stringify(members));
                    localStorage.setItem('vms_hist_f53', JSON.stringify(historyDocs));
                    localStorage.setItem('vms_logo_f53', appLogo || '');
                    localStorage.setItem('vms_on_f53', orgName);
                    localStorage.setItem('vms_oa_f53', orgAddr);
                    localStorage.setItem('vms_ss_f53', JSON.stringify(savedSeals));
                    localStorage.setItem('vms_at_f53', JSON.stringify(activityTypes));
                    
                    // 사전 등록 설정값 저장 (_v2 키 적용)
                    localStorage.setItem('vms_pt_v2', JSON.stringify(presetTitles));
                    localStorage.setItem('vms_pp_v2', JSON.stringify(presetPreparations));
                    localStorage.setItem('vms_po_v2', JSON.stringify(presetOtherDetails));
                } catch (error) {
                    if (error.name === 'QuotaExceededError') {
                        console.error("저장 공간 부족 오류 발생");
                        // 렌더링에 방해되지 않도록 console로만 알림
                    }
                }
            }, [members, historyDocs, appLogo, orgName, orgAddr, savedSeals, activityTypes, presetTitles, presetPreparations, presetOtherDetails]);

            // 검색어, 정렬 변경 시 페이지 1로 리셋
            useEffect(() => {
                setCurrentPage(1);
            }, [dbSearchTerm, sortConfig]);

            // 현재 선택된 멤버들을 바탕으로 생성되는 참석자 문자열
            const autoAttendeesStr = useMemo(() => {
                return members.filter(m => selectedMemberIds.includes(m.id)).map(m => m.name).join(', ');
            }, [members, selectedMemberIds]);

            // 보고서 탭에 진입하면 기본값으로 활동 정보의 내용을 미리 불러오도록 세팅
            useEffect(() => {
                if (previewDocType === 'report' && !reportRowInput.title && !reportRowInput.date && editingReportRowIndex === null) {
                    setReportRowInput(prev => ({
                        ...prev,
                        date: activityDetails.date.replace(/-/g, '.'),
                        title: activityDetails.title,
                        location: activityDetails.location,
                        startTime: activityDetails.startTime,
                        endTime: activityDetails.endTime,
                        recognizedTime: activityDetails.totalTimeNum,
                        attendeeMode: 'auto'
                    }));
                }
            }, [previewDocType, activityDetails, reportRowInput.title, reportRowInput.date, editingReportRowIndex]);

            // --- Handlers ---
            const handleAddressComplete = (data) => {
                const selectedAddress = data.address || '';

                if (!selectedAddress) {
                    setIsAddressModalOpen(false);
                    setAddressTarget(null);
                    return;
                }

                // 신규 회원 입력 폼
                if (addressTarget?.mode === 'new') {
                    setNewMember(prev => ({
                        ...prev,
                        address: selectedAddress
                    }));
                }

                // 기존 회원 수정: 편집 폼 + 모달 내 상태 업데이트
                if (addressTarget?.mode === 'edit') {
                    setEditFormData(prev => ({
                        ...prev,
                        address: selectedAddress
                    }));
                }

                setIsAddressModalOpen(false);
                setAddressTarget(null);
            };

            const handleAddMember = () => {
                if (!newMember.name.trim()) return;
                const finalNo = newMember.excelNo || calculateNextNo(members).toString();
                
                const newEntry = {
                    ...newMember,
                    id: typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : (Date.now() + Math.random()).toString(36),
                    excelNo: finalNo,
                    phone: formatPhone(newMember.phone),
                    dob: formatDate(newMember.dob),
                    joinDate: formatDate(newMember.joinDate)
                };

                setMembers([newEntry, ...members]);
                setNewMember({ name: '', category: '봉사자', role: '', phone: '', email: '', dob: '', address: '', excelNo: (parseInt(finalNo) + 1).toString(), joinDate: '' });
            };

            // 최적화된 엑셀 업로드 핸들러
            const handleExcelUpload = (e) => {
                const f = e.target.files[0]; 
                if (!f) return;
                
                setIsUploading(true); // 로딩 화면 표시
                
                // setTimeout으로 UI 렌더링 스레드를 우선 양보하여 로딩 화면이 뜨게 함
                setTimeout(() => {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        try {
                            const wb = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                            let currentMax = members.length > 0 ? Math.max(...members.map(m => parseInt(m.excelNo) || 0)) : 0;

                            const parsed = json.map((row, i) => {
                                const phoneRaw = String(row['전화번호'] || row['연락처'] || row['휴대폰'] || '');
                                let eNo = String(row['No.'] || row['no'] || row['번호'] || row['No'] || '').trim();
                                if (!eNo) {
                                    currentMax++;
                                    eNo = currentMax.toString();
                                } else {
                                    const pNo = parseInt(eNo);
                                    if (!isNaN(pNo) && pNo > currentMax) currentMax = pNo;
                                }

                                return {
                                    id: typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : (Date.now() + i + Math.random()).toString(36),
                                    excelNo: eNo,
                                    name: String(row['성명'] || row['이름'] || '').trim(),
                                    category: String(row['구분'] || '봉사자').trim(),
                                    role: String(row['역할'] || row['직책'] || row['직위'] || '').trim(),
                                    phone: formatPhone(phoneRaw),
                                    email: String(row['이메일'] || row['e-mail'] || row['email'] || '').trim(),
                                    dob: parseExcelDate(row['생년월일']),
                                    address: String(row['주소'] || '').trim(),
                                    joinDate: parseExcelDate(row['가입일'] || row['등록일']),
                                }
                            }).filter(m => m.name);
                            
                            setMembers(p => [...parsed, ...p]);
                            alert(`${parsed.length}명의 데이터를 성공적으로 불러왔습니다.`);
                        } catch (error) {
                            alert("엑셀 파일 파싱 중 오류가 발생했습니다.");
                            console.error(error);
                        } finally {
                            setIsUploading(false); // 로딩 화면 종료
                        }
                    };
                    reader.readAsArrayBuffer(f);
                }, 100);
                
                e.target.value = '';
            };

            // 엑셀 파일 다운로드: Save As 기능 강제 (showSaveFilePicker 사용, 실패 시 기본 다운로드)
            const handleExcelDownload = async () => {
                if (members.length === 0) return alert("저장할 회원 데이터가 없습니다.");
                const exportData = members.map(m => ({
                    'No.': m.excelNo,
                    '성명': m.name,
                    '구분': m.category,
                    '역할': m.role,
                    '연락처': m.phone,
                    '이메일': m.email,
                    '생년월일': m.dob,
                    '가입일': m.joinDate,
                    '주소': m.address
                }));
                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "회원명부");
                
                const defaultFileName = `회원명부.xlsx`;

                try {
                    // File System Access API를 이용해 "다른 이름으로 저장" 창 호출
                    if (window.showSaveFilePicker) {
                        const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                        const blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

                        const handle = await window.showSaveFilePicker({
                            suggestedName: defaultFileName,
                            types: [{
                                description: 'Excel Spreadsheet',
                                accept: {'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx']}
                            }]
                        });
                        const writable = await handle.createWritable();
                        await writable.write(blob);
                        await writable.close();
                    } else {
                        // 구형 브라우저 등 지원 안 하는 경우
                        XLSX.writeFile(wb, defaultFileName);
                    }
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        // iframe 보안 정책 등으로 showSaveFilePicker가 차단된 경우 안전하게 폴백(기본 다운로드) 실행
                        XLSX.writeFile(wb, defaultFileName);
                    }
                }
            };

            const handleClearMembers = () => {
                if (confirm("회원 명부를 정말 모두 초기화하시겠습니까?\n저장되지 않은 데이터는 복구할 수 없습니다.")) {
                    setMembers([]);
                }
            };

            // 전체 보관소 기록 삭제 핸들러
            const handleClearHistory = () => {
                if (historyDocs.length === 0) return alert("삭제할 기록이 없습니다.");
                if (confirm("보관소의 모든 기록을 정말 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.")) {
                    setHistoryDocs([]);
                }
            };

            // 회원 서명 이미지 업로드 핸들러
            const handleMemberSignatureUpload = async (e, memberId) => {
                const file = e.target.files[0];
                if (!file) return;
                const b64 = await resizeImage(file, 200); // 서명용으로 가로 200px 리사이즈
                setMembers(prev => prev.map(m => m.id === memberId ? { ...m, signature: b64 } : m));
                e.target.value = '';
            };

            // 수정: 문서에 기록된 참석자가 DB에서 누락되어 명단이 안 보이는 현상 완벽 방지
            const restoreHistory = (doc) => {
                // 1. activityDetails 복원 (reportDetails 필드 제외)
                const restoredActivityDetails = { ...doc.details };
                delete restoredActivityDetails.reportDetails;
                
                // 2. 누락될 수 있는 배열 데이터 초기화 보장
                if (!restoredActivityDetails.targetAudience) restoredActivityDetails.targetAudience = [];
                if (!restoredActivityDetails.activityField) restoredActivityDetails.activityField = [];
                
                setActivityDetails(restoredActivityDetails);

                // 3. reportDetails 복원
                if (doc.details.reportDetails) {
                    setReportDetails(doc.details.reportDetails);
                } else {
                    setReportDetails({ joinCount: '0', joinNames: '', leaveCount: '0', leaveNames: '', incomeBranch: '0', incomeInterest: '0', carryover: '0', expense: '0', activityType: '3', rows: [] });
                }

                // 4. 참석자 복원 및 DB 누락 방지 (가장 중요한 부분)
                if (doc.attendees && Array.isArray(doc.attendees)) {
                    // ID 추출
                    const loadedIds = doc.attendees.map(a => a.id || a);
                    setSelectedMemberIds(loadedIds);
                    
                    // DB에 없는 멤버가 있다면 복구 (백업 파일에서 불러왔거나 회원이 삭제되었을 때 명단 빈칸 방지)
                    setMembers(prev => {
                        const newMembers = [...prev];
                        let isModified = false;
                        doc.attendees.forEach(att => {
                            if (typeof att === 'object' && att.id && !newMembers.some(m => m.id === att.id)) {
                                newMembers.push(att);
                                isModified = true;
                            }
                        });
                        return isModified ? newMembers : prev;
                    });
                } else {
                    setSelectedMemberIds([]);
                }
                
                setEditingReportRowIndex(null);
                setEditingHistoryId(doc.id); // 편집 모드 활성화
                setActiveTab('create');
            };

            // 통합 기록 보관 (새 문서 저장 OR 기존 문서 수정 덮어쓰기)
            const handleSaveRecord = () => {
                if (!activityDetails.title) return alert("활동명(제목)을 입력해주세요.");

                const currentAttendees = members.filter(m => selectedMemberIds.includes(m.id));

                // 현재 작성 중인 상태를 하나의 record 객체로 묶음
                const record = {
                    id: editingHistoryId || Date.now().toString(), // 편집 중이면 기존 ID 유지
                    createdAt: editingHistoryId 
                        ? (historyDocs.find(d => d.id === editingHistoryId)?.createdAt || new Date().toLocaleString()) 
                        : new Date().toLocaleString(),
                    updatedAt: new Date().toLocaleString(),
                    title: activityDetails.title,
                    details: { ...activityDetails, reportDetails },
                    attendees: currentAttendees
                };

                if (editingHistoryId) {
                    // 편집 모드: 기존 기록 덮어쓰기
                    setHistoryDocs(prev => prev.map(doc => doc.id === editingHistoryId ? record : doc));
                    alert("수정된 내용이 보관소에 저장되었습니다.\n(계획서, 참석명부, 확인서, 보고서 모두 갱신됨)");
                } else {
                    // 새 문서 모드: 새 기록 추가
                    setHistoryDocs(prev => [record, ...prev]);
                    alert("새로운 기록이 보관소에 저장되었습니다.\n(계획서, 참석명부, 확인서, 보고서 모두 저장됨)");
                    setEditingHistoryId(record.id); // 저장 직후 해당 문서를 계속 편집하는 상태로 유지
                }
            };

            // PDF 인쇄 시 파일명을 자동으로 설정하기 위한 프린트 핸들러
            const handlePrint = () => {
                // 날짜 포맷 정리 (예: 2026-03-23 -> 20260323)
                const dateStr = activityDetails.date ? activityDetails.date.replace(/-/g, '') : '';
                
                let docName = '';
                if (previewDocType === 'plan') {
                    docName = `${dateStr} 자원봉사 활동 계획서`;
                } else if (previewDocType === 'roster') {
                    docName = `${dateStr} 참석 명부`;
                } else if (previewDocType === 'cert') {
                    docName = `${dateStr} 자원 봉사 활동 확인서`;
                } else if (previewDocType === 'report') {
                    docName = `${dateStr} ${orgName} 활동보고서(적십자)`;
                } else {
                    docName = '자원봉사_문서';
                }

                // 현재 타이틀 백업 후 변경
                const originalTitle = document.title;
                document.title = docName;
                
                // 인쇄 다이얼로그 호출
                window.print();
                
                // 인쇄 다이얼로그가 뜬 후 원래 타이틀로 복원
                setTimeout(() => { document.title = originalTitle; }, 1000);
            };

            // "현재 정보 불러오기" 수동 클릭 시 동작
            const loadToReportRow = () => {
                setReportRowInput({
                    date: activityDetails.date.replace(/-/g, '.'),
                    title: activityDetails.title,
                    location: activityDetails.location,
                    startTime: activityDetails.startTime,
                    endTime: activityDetails.endTime,
                    recognizedTime: activityDetails.totalTimeNum,
                    attendeeMode: 'auto',
                    attendees: ''
                });
                setEditingReportRowIndex(null); // 불러오기 시 편집 모드 취소
            };

            // 시간 변경 시 자동으로 인정 시간 계산
            const handleReportTimeChange = (field, value) => {
                setReportRowInput(prev => {
                    const newState = { ...prev, [field]: value };
                    if (newState.startTime && newState.endTime) {
                        const [sH, sM] = newState.startTime.split(':').map(Number);
                        const [eH, eM] = newState.endTime.split(':').map(Number);
                        let diffMin = (eH * 60 + eM) - (sH * 60 + sM);
                        if (diffMin < 0) diffMin += 24 * 60; // 자정을 넘길 경우
                        newState.recognizedTime = (diffMin / 60).toFixed(1).replace('.0', '');
                    }
                    return newState;
                });
            };

            // 보고서 표에 내역 추가 및 수정
            const handleAddCurrentToReportRows = () => {
                if (!reportRowInput.title && !reportRowInput.date) {
                    alert("추가/수정할 내역을 입력해주세요.");
                    return;
                }
                
                const finalAttendees = reportRowInput.attendeeMode === 'auto' ? autoAttendeesStr : reportRowInput.attendees;

                const newRow = { 
                    type: reportDetails.activityType, 
                    date: reportRowInput.date, 
                    title: reportRowInput.title, 
                    location: reportRowInput.location, 
                    activityTime: `${reportRowInput.startTime}~${reportRowInput.endTime}`,
                    recognizedTime: reportRowInput.recognizedTime,
                    attendees: finalAttendees 
                };

                if (editingReportRowIndex !== null) {
                    // 기존 행 수정
                    const newRows = [...reportDetails.rows];
                    newRows[editingReportRowIndex] = newRow;
                    setReportDetails(prev => ({ ...prev, rows: newRows }));
                    alert("활동 내역이 수정되었습니다.");
                    setEditingReportRowIndex(null);
                } else {
                    // 새 행 추가
                    setReportDetails(prev => ({ ...prev, rows: [...prev.rows, newRow] }));
                    alert("활동 내역이 보고서에 추가되었습니다.");
                }
                
                // 폼 초기화
                setReportRowInput({ date: '', title: '', location: '', startTime: '', endTime: '', recognizedTime: '', attendees: '', attendeeMode: 'auto' });
            };

            // 보고서 표 내역 편집 모드 진입
            const handleEditReportRow = (index) => {
                const row = reportDetails.rows[index];
                let sTime = '', eTime = '';
                if (row.activityTime && row.activityTime.includes('~')) {
                    [sTime, eTime] = row.activityTime.split('~');
                }
                setReportRowInput({
                    date: row.date || '',
                    title: row.title || '',
                    location: row.location || '',
                    startTime: sTime,
                    endTime: eTime,
                    recognizedTime: row.recognizedTime || '',
                    attendees: row.attendees || '',
                    attendeeMode: 'manual' // 수정 시에는 기본으로 수동 모드 텍스트를 보여줌
                });
                setReportDetails(prev => ({ ...prev, activityType: row.type }));
                setEditingReportRowIndex(index);
            };

            // 보고서 표 내역 삭제
            const handleDeleteReportRow = (index) => {
                if (confirm("이 내역을 삭제하시겠습니까?")) {
                    const newRows = [...reportDetails.rows];
                    newRows.splice(index, 1);
                    setReportDetails(prev => ({ ...prev, rows: newRows }));
                    
                    if (editingReportRowIndex === index) {
                        setEditingReportRowIndex(null);
                        setReportRowInput({ date: '', title: '', location: '', startTime: '', endTime: '', recognizedTime: '', attendees: '', attendeeMode: 'auto' });
                    } else if (editingReportRowIndex > index) {
                        setEditingReportRowIndex(editingReportRowIndex - 1);
                    }
                }
            };

            const handleNewDocReset = () => {
                let bal = '0';
                if (historyDocs.length > 0) {
                    const latest = [...historyDocs].sort((a,b) => parseInt(b.id) - parseInt(a.id))[0];
                    const rd = latest.details.reportDetails;
                    bal = (Number(String(rd.carryover || '0').replace(/,/g, '')) + Number(String(rd.incomeBranch || '0').replace(/,/g, '')) + Number(String(rd.incomeInterest || '0').replace(/,/g, '')) - Number(String(rd.expense || '0').replace(/,/g, ''))).toLocaleString();
                }
                if (confirm("새 문서 작성을 시작하시겠습니까?\n저장하지 않은 내용은 사라집니다.")) {
                    const defaultManager = members.find(m => m.name === '윤금서' && m.category === '관리자');
                    setActivityDetails({ title: '', date: new Date().toISOString().split('T')[0], startTime: '13:00', endTime: '17:00', totalTimeNum: '4', location: '', managerId: defaultManager ? defaultManager.id : '', manager: defaultManager ? defaultManager.name : '윤금서', managerPhone: defaultManager ? defaultManager.phone : '', targetAudience: [], activityField: [], preparation: '', otherDetails: '' });
                    setReportDetails({ joinCount: '0', joinNames: '', leaveCount: '0', leaveNames: '', incomeBranch: '0', incomeInterest: '0', carryover: bal, expense: '0', activityType: '3', rows: [] });
                    setSelectedMemberIds([]); 
                    setReportRowInput({ date: '', title: '', location: '', startTime: '', endTime: '', recognizedTime: '', attendees: '', attendeeMode: 'auto' });
                    setEditingReportRowIndex(null);
                    setEditingHistoryId(null); // 새 문서 모드로 전환
                    setPreviewDocType('plan'); setActiveTab('create');
                }
            };

            // 백업 파일 저장: Save As 기능 강제 적용
            const handleExportHistory = async () => {
                if (historyDocs.length === 0) return alert("보관된 기록이 없습니다.");
                const dataStr = JSON.stringify(historyDocs, null, 2);

                // 날짜와 활동 명칭을 조합하여 백업 파일명 생성 (예: 20260212 임은정 바.json)
                const dateStr = activityDetails.date ? activityDetails.date.replace(/-/g, '') : '';
                const titleStr = activityDetails.title ? activityDetails.title.trim() : '전체백업';
                const backupFileName = `${dateStr} ${titleStr}.json`.trim();

                try {
                    // File System Access API를 이용해 "다른 이름으로 저장" 강제 호출
                    if (window.showSaveFilePicker) {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: backupFileName,
                            types: [{
                                description: 'JSON Backup File',
                                accept: {'application/json': ['.json']}
                            }]
                        });
                        const writable = await handle.createWritable();
                        await writable.write(dataStr);
                        await writable.close();
                    } else {
                        throw new Error('API Not Supported'); // API가 없으면 Fallback으로 던짐
                    }
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        // iframe 보안 제약(Cross origin 등)으로 인해 에러가 발생한 경우 안전한 방식(a태그)으로 다운로드 강제
                        const blob = new Blob([dataStr], { type: "application/json" });
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement("a");
                        link.href = url;
                        link.download = backupFileName;
                        
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        
                        URL.revokeObjectURL(url);
                    }
                }
            };

            const handleImportHistory = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (Array.isArray(parsed)) {
                            setHistoryDocs(parsed);
                            alert("기록을 성공적으로 불러왔습니다.");
                        }
                    } catch (err) { alert("파일 형식이 올바르지 않습니다."); }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            // 보관소 선택 기록 삭제 핸들러
            const handleDeleteSelectedHistory = () => {
                if (selectedHistoryIds.length === 0) return alert("삭제할 기록을 선택해주세요.");
                if (confirm(`선택한 ${selectedHistoryIds.length}개의 기록을 정말 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) {
                    setHistoryDocs(historyDocs.filter(doc => !selectedHistoryIds.includes(doc.id)));
                    setSelectedHistoryIds([]); // 삭제 후 선택 초기화
                }
            };

            const sortedList = useMemo(() => {
                let list = members.filter(m => (m.name || "").includes(dbSearchTerm));
                if (sortConfig.key) {
                    list.sort((a, b) => {
                        let vA = a[sortConfig.key] || ''; let vB = b[sortConfig.key] || '';
                        if (sortConfig.key === 'excelNo') return (parseInt(vA) || 0) - (parseInt(vB) || 0);
                        return String(vA).localeCompare(String(vB), 'ko-KR');
                    });
                    if (sortConfig.direction === 'desc') list.reverse();
                }
                return list;
            }, [members, dbSearchTerm, sortConfig]);

            const docSearchResults = useMemo(() => docSearchTerm.trim() ? members.filter(m => m.name.includes(docSearchTerm)).sort((a,b)=>a.name.localeCompare(b.name, 'ko-KR')) : [], [members, docSearchTerm]);

            const handleKeyDown = (e) => {
                if (docSearchResults.length === 0) return;
                if (e.key === 'ArrowDown') { e.preventDefault(); setFocusedIndex(p => (p < docSearchResults.length - 1 ? p + 1 : p)); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); setFocusedIndex(p => (p > 0 ? p - 1 : 0)); }
                else if (e.key === 'Enter') {
                    e.preventDefault();
                    const target = docSearchResults[focusedIndex >= 0 ? focusedIndex : 0];
                    if (target && !selectedMemberIds.includes(target.id)) setSelectedMemberIds([...selectedMemberIds, target.id]);
                    setDocSearchTerm(''); setFocusedIndex(-1);
                }
            };

            const currentManagerSeal = savedSeals[activityDetails.manager];
            const selList = selectedMemberIds.map(id => members.find(m => m.id === id)).filter(Boolean);

            // 회원 DB 페이징 처리 로직
            const totalPages = Math.ceil(sortedList.length / rowsPerPage);
            const paginatedList = useMemo(() => {
                const startIndex = (currentPage - 1) * rowsPerPage;
                return sortedList.slice(startIndex, startIndex + rowsPerPage);
            }, [sortedList, currentPage]);

            // 공통 사전 등록 설정 매니저 렌더링 함수
            const renderPresetManager = (title, icon, items, setItems) => (
                <section className="space-y-4 pt-6 border-t">
                    <h3 className={UI.sectionTitle}><Icon name={icon} size={24}/> {title}</h3>
                    <div className="space-y-2">
                        {items.map((item, idx) => (
                            <div key={item.id} className="flex gap-2 items-center">
                                <input type="text" className={UI.input} value={item.label} onChange={e => {
                                    const newItems = [...items];
                                    newItems[idx].label = e.target.value;
                                    setItems(newItems);
                                }} placeholder="항목 내용을 입력하세요" />
                                <button onClick={() => setItems(items.filter(t => t.id !== item.id))} className="text-red-500 p-2 hover:bg-red-50 rounded-lg transition-colors"><Icon name="MinusCircle" size={20}/></button>
                            </div>
                        ))}
                        <button onClick={() => setItems([...items, { id: Date.now().toString(), label: '' }])} className="w-full bg-slate-100 text-slate-600 p-3 rounded-lg text-sm font-bold border border-dashed border-slate-300 flex items-center justify-center gap-2 mt-2 hover:bg-slate-200 transition-colors"><Icon name="PlusCircle" size={16}/> 항목 추가</button>
                    </div>
                </section>
            );

            return (
                <div className="min-h-screen flex flex-col font-bold print:block relative">
                    {/* 브라우저 다운 현상을 방지하기 위한 대용량 파싱 중 전면 로딩 화면 */}
                    {isUploading && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[9999] flex items-center justify-center backdrop-blur-sm no-print">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center">
                                <Icon name="Loader2" className="animate-spin text-indigo-600 mb-4" size={48} />
                                <h3 className="text-xl font-bold text-slate-800">엑셀 데이터를 처리 중입니다</h3>
                                <p className="text-slate-500 text-sm mt-2">데이터 양에 따라 약간의 시간이 소요될 수 있습니다...</p>
                            </div>
                        </div>
                    )}

                    {/* React에서 동적으로 @page 크기 조정 - 가로 모드 잘림 방지를 위해 마진 10mm로 조정 */}
                    {previewDocType === 'report' ? (
                        <style>{`@media print { @page { size: A4 landscape; margin: 10mm; } }`}</style>
                    ) : (
                        <style>{`@media print { @page { size: A4 portrait; margin: 15mm; } }`}</style>
                    )}

                    <nav className="bg-slate-900 text-white px-8 py-5 shadow-2xl no-print flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-4">
                            {appLogo ? <img src={appLogo} alt="Logo" className="w-10 h-10 object-contain rounded bg-white p-1" /> : <div className="bg-blue-600 p-2 rounded-xl font-bold"><Icon name="Shield" /></div>}
                            <h1 className="text-xl tracking-tighter uppercase font-bold">VMS CENTER</h1>
                        </div>
                        <div className="flex gap-2 items-center">
                            {editingHistoryId && (
                                <span className="bg-amber-500 text-white text-xs px-3 py-1.5 rounded-full font-bold shadow-inner mr-2 animate-pulse">
                                    현재 문서 수정 중
                                </span>
                            )}
                            <button onClick={handleNewDocReset} className={UI.buttonSuccess}><Icon name="PlusCircle" size={16} /> 새 문서</button>
                            <button onClick={() => setActiveTab('members')} className={cx("px-5 py-2 rounded-xl text-sm transition-all font-bold", activeTab === 'members' ? 'bg-white text-slate-900 shadow-xl' : 'text-slate-400 hover:text-white')}>회원 명부</button>
                            <button onClick={() => setActiveTab('create')} className={cx("px-5 py-2 rounded-xl text-sm transition-all font-bold", activeTab === 'create' ? 'bg-white text-slate-900 shadow-xl' : 'text-slate-400 hover:text-white')}>문서 작성</button>
                            <button onClick={() => setActiveTab('history')} className={cx("px-5 py-2 rounded-xl text-sm transition-all font-bold", activeTab === 'history' ? 'bg-white text-slate-900 shadow-xl' : 'text-slate-400 hover:text-white')}>보관소</button>
                        </div>
                        <button onClick={() => setIsSettingsOpen(true)} className="p-3 px-4 bg-slate-800 rounded-xl hover:bg-slate-700 transition-colors font-bold flex items-center gap-2"><Icon name="Settings" size={20}/><span>Setup</span></button>
                    </nav>

                    <main className="flex-1 p-6 w-full overflow-x-hidden font-bold print:p-0 print:overflow-visible">
                        {activeTab === 'members' && (
                            <div className="space-y-6 max-w-7xl mx-auto animate-in fade-in slide-in-from-bottom-4">
                                <div className={cx(UI.panel, "no-print")}>
                                    <h3 className={cx(UI.sectionTitle, "mb-5 text-blue-900")}><Icon name="UserPlus" className="text-blue-600"/> 회원 신규 등록</h3>
                                    <div className="flex flex-wrap gap-3 items-end">
                                        <div className="w-16"><label className="text-[10px] block mb-1">No.</label><input type="text" className={UI.input} value={newMember.excelNo} onChange={e=>setNewMember({...newMember, excelNo: e.target.value})} /></div>

                                </div>

                                                <Icon name="Upload" size={16}/> 엑셀 불러오기

                                            <input id="xls-up" type="file" className="hidden" accept=".xlsx,.xls" onChange={handleExcelUpload} />

                                            </button>
                                            <div className="w-px h-6 bg-slate-300 mx-1"></div>

                                                <Icon name="Trash2" size={16}/> 전체 초기화

                                                    <th onClick={() => setSortConfig({key:'category', direction:sortConfig.direction==='asc'?'desc':'asc'})}>구분</th>

                                                    <th onClick={() => setSortConfig({key:'address', direction:sortConfig.direction==='asc'?'desc':'asc'})}>주소지</th>

                                                        <td className="font-bold whitespace-nowrap">{m.phone}</td>

                                                        <input type="text" className={UI.input} placeholder="이자" value={reportDetails.incomeInterest} onChange={e=>setReportDetails({...reportDetails, incomeInterest: e.target.value})} />
                                                    </div>

                                            <ActivityInfoInput details={activityDetails} setDetails={setActivityDetails} members={members} presetTitles={presetTitles} presetPreparations={presetPreparations} presetOtherDetails={presetOtherDetails} />
                                            <AttendanceListInput docSearchTerm={docSearchTerm} setDocSearchTerm={setDocSearchTerm} focusedIndex={focusedIndex} setFocusedIndex={setFocusedIndex} docSearchResults={docSearchResults} handleKeyDown={handleKeyDown} selectedMemberIds={selectedMemberIds} setSelectedMemberIds={setSelectedMemberIds} members={members} setMembers={setMembers} />
                                        </Fragment>

                                                    <input 
                                                        type="checkbox" 
                                                        checked={useAutoSignature} 
                                                        onChange={(e) => setUseAutoSignature(e.target.checked)}

                                                </label>
